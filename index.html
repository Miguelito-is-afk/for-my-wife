<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Journey | Miguel & Hillary</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght=700&family=Poppins:wght=300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Floating Background Hearts -->
    <div class="hearts-container">
        <div class="floating-heart" style="left:5%; animation-delay:0s">💜</div>
        <div class="floating-heart" style="left:15%; animation-delay:2s">🌸</div>
        <div class="floating-heart" style="left:25%; animation-delay:5s">✨</div>
        <div class="floating-heart" style="left:40%; animation-delay:1s">🌸</div>
        <div class="floating-heart" style="left:55%; animation-delay:3s">💜</div>
        <div class="floating-heart" style="left:70%; animation-delay:6s">✨</div>
        <div class="floating-heart" style="left:85%; animation-delay:2s">🌸</div>
        <div class="floating-heart" style="left:92%; animation-delay:4s">💜</div>
    </div>

    <!-- Pinned Floating Control Panel Button -->
    <button class="fab-admin-btn" id="open-control-panel-btn" onclick="toggleControlPanel(true)" title="Open Control Panel">🛠️</button>

    <!-- Control Panel Modal Overlay -->
    <div class="modal-overlay" id="control-panel-modal">
        <div class="control-panel-card">
            <button class="close-modal-btn" onclick="toggleControlPanel(false)">&times;</button>
            <h3>Control Panel</h3>
            
            <div id="admin-auth-zone">
                <input type="password" id="admin-password" placeholder="Enter Secret Code to Access...">
            </div>
            
            <div id="admin-upload-zone" style="display: none;">
                
                <!-- Tab Switching Panel Header Navigation -->
                <div class="panel-tabs">
                    <button class="tab-btn active" id="tab-btn-upload" onclick="switchPanelTab('upload')">Upload Memory 📸</button>
                    <button class="tab-btn" id="tab-btn-logs" onclick="switchPanelTab('logs')">System Console 🖥️</button>
                </div>

                <!-- TAB CONTENT 1: UPLOAD CORE CONFIG PANEL -->
                <div id="tab-content-upload">
                    <div class="upload-field">
                        <label for="photo-file" class="custom-file-upload">Choose Photo 📸</label>
                        <input type="file" id="photo-file" accept="image/*">
                        <span id="file-name-display">No file selected</span>
                    </div>

                    <!-- Interactive Upload Preview Area -->
                    <div id="preview-container" style="display: none;">
                        <img id="upload-preview" src="" alt="Upload Preview">
                        <button type="button" class="remove-preview-btn" onclick="removePreview()" title="Remove Image">&times;</button>
                    </div>

                    <!-- Custom Date Picker Field -->
                    <div class="date-field">
                        <label for="photo-date">When was this memory captured? 📅</label>
                        <input type="date" id="photo-date">
                    </div>
                    
                    <div class="slider-field">
                        <label>Adjust Focus Position (Up/Down):</label>
                        <input type="range" id="focus-y" min="0" max="100" value="50">
                    </div>
                    
                    <button class="action-btn" id="upload-submit-btn">Publish Memory Live ✨</button>
                    <p id="upload-status"></p>
                </div>

                <!-- TAB CONTENT 2: DATABASE STATUS & RUNTIME ENGINE LOGS TERMINAL -->
                <div id="tab-content-logs" style="display: none;">
                    <div class="terminal-status-bar">
                        <span class="status-indicator-label">Database Network:</span>
                        <span id="db-status-badge" class="badge-connecting">CONNECTING...</span>
                    </div>
                    
                    <!-- Real-Time Text Output Window -->
                    <div class="terminal-console" id="terminal-console"></div>
                    
                    <button class="clear-logs-btn" onclick="clearConsoleLogs()">Clear Terminal Screen</button>
                </div>

            </div>
        </div>
    </div>

    <!-- Photo Details Lightbox Modal -->
    <div class="modal-overlay" id="details-modal" onclick="toggleDetailsModal(false)">
        <div class="details-card" onclick="event.stopPropagation()">
            <button class="close-modal-btn" onclick="toggleDetailsModal(false)">&times;</button>
            <div class="details-img-wrapper">
                <img id="details-img" src="" alt="Memory Preview Detailed View">
            </div>
            <p id="details-date-string"></p>
        </div>
    </div>

    <header class="hero-header reveal">
        <h1>Our Beautiful Journey</h1>
        <div class="big-heart">💜</div>
    </header>

    <main class="container">
        <!-- Relationship Milestone Counter -->
        <section class="timer-card reveal">
            <h3>Our Time Together</h3>
            <div id="timer">
                <div class="time-box"><span id="days">0</span><p>Days</p></div>
                <div class="time-box"><span id="hours">0</span><p>Hours</p></div>
                <div class="time-box"><span id="minutes">0</span><p>Mins</p></div>
                <div class="time-box"><span id="seconds">0</span><p>Secs</p></div>
            </div>
        </section>

        <!-- Scrapbook Dynamic Timeline Display -->
        <div class="timeline" id="dynamic-timeline"></div>

        <div class="center-container reveal">
            <button class="toggle-btn" id="toggle-pics-btn" onclick="togglePics()">Show More Pics 🌸</button>
        </div>
    </main>

    <footer class="reveal">
        <p>Created with 💜 by your hubby, Miguel</p>
        <p class="her-name">Hillary Angela L. Negapatan</p>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy, doc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBu7KYw-7X2k_JzDDwvAXZB48vWe0XPRaU",
            authDomain: "scrapbook-project-df635.firebaseapp.com",
            projectId: "scrapbook-project-df635",
            storageBucket: "scrapbook-project-df635.firebasestorage.app",
            messagingSenderId: "278025227308",
            appId: "1:278025227308:web:7fcf871b8526f8a7b41589",
            measurementId: "G-68EYEVHS7Z"
        };

        // Initialize Engine & Core Systems Setup Tracking Logs
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let localMemoriesArray = [];
        let showAllPhotos = false;
        let isAdmin = false; 

        // System Log Engine Terminal Pipeline Writer
        window.writeSystemLog = function(message, type = 'info') {
            const consoleBox = document.getElementById("terminal-console");
            if (!consoleBox) return;

            const entry = document.createElement("div");
            entry.className = `log-entry log-${type}`;
            
            const timestamp = new Date().toLocaleTimeString('en-US', { hour12: false });
            entry.innerHTML = `<span class="log-time">[${timestamp}]</span> <span class="log-msg">${message}</span>`;
            
            consoleBox.appendChild(entry);
            consoleBox.scrollTop = consoleBox.scrollHeight; // Auto anchor text view to frame bottom
        };

        window.clearConsoleLogs = function() {
            const consoleBox = document.getElementById("terminal-console");
            if (consoleBox) {
                consoleBox.innerHTML = "";
                window.writeSystemLog("Terminal buffer cleared by user configuration.", "sys");
            }
        };

        window.updateDatabaseBadgeStatus = function(stateText, className) {
            const badge = document.getElementById("db-status-badge");
            if (badge) {
                badge.innerText = stateText.toUpperCase();
                badge.className = className;
            }
        };

        // UI Tab View Context Switcher Mechanics
        window.switchPanelTab = function(targetTab) {
            const uploadBtn = document.getElementById("tab-btn-upload");
            const logsBtn = document.getElementById("tab-btn-logs");
            const uploadContent = document.getElementById("tab-content-upload");
            const logsContent = document.getElementById("tab-content-logs");

            if (targetTab === 'upload') {
                uploadBtn.classList.add("active");
                logsBtn.classList.remove("active");
                uploadContent.style.display = "block";
                logsContent.style.display = "none";
                window.writeSystemLog("Switched display to Media Upload Workspace panel view.", "info");
            } else {
                logsBtn.classList.add("active");
                uploadBtn.classList.remove("active");
                uploadContent.style.display = "none";
                logsContent.style.display = "block";
                window.writeSystemLog("Switched display to Live Terminal Pipeline output console monitor.", "info");
            }
        };

        // Core App Window Layout View Framework Controllers
        window.toggleControlPanel = function(show) {
            const modal = document.getElementById("control-panel-modal");
            if (show) {
                modal.classList.add("visible");
                window.writeSystemLog("Control Panel Modal Window opened successfully.", "sys");
            } else {
                modal.classList.remove("visible");
            }
        };

        window.toggleDetailsModal = function(show) {
            const modal = document.getElementById("details-modal");
            if (show) {
                modal.classList.add("visible");
            } else {
                modal.classList.remove("visible");
            }
        };

        window.openPhotoDetails = function(imgUrl, dateString, focusY) {
            const img = document.getElementById("details-img");
            const caption = document.getElementById("details-date-string");
            
            img.src = imgUrl;
            img.style.objectPosition = `center ${focusY || '50%'}`;
            
            const dateObj = new Date(dateString);
            caption.innerText = `Captured on: ${dateObj.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' })} 💜`;
            
            window.writeSystemLog(`Lightbox opened for memory block data string. Date target: ${dateString}`, "info");
            toggleDetailsModal(true);
        };

        // File stream parsing logic
        const fileInput = document.getElementById("photo-file");
        const focusInput = document.getElementById("focus-y");
        const previewContainer = document.getElementById("preview-container");
        const previewImg = document.getElementById("upload-preview");
        const fileNameDisplay = document.getElementById("file-name-display");
        const dateInput = document.getElementById("photo-date");

        fileInput.addEventListener("change", (e) => {
            const file = e.target.files[0];
            if (file) {
                fileNameDisplay.innerText = file.name;
                window.writeSystemLog(`File asset pipeline read target matching: "${file.name}" (${(file.size / 1024).toFixed(1)} KB)`, "info");
                const reader = new FileReader();
                reader.onload = function(event) {
                    previewImg.src = event.target.result;
                    previewContainer.style.display = "block";
                    previewImg.style.objectPosition = `center ${focusInput.value}%`;
                    window.writeSystemLog("Local dynamic memory thumbnail source preview loaded successfully.", "success");
                };
                reader.readAsDataURL(file);
            } else {
                removePreview();
            }
        });

        focusInput.addEventListener("input", (e) => {
            if (previewImg.src) {
                previewImg.style.objectPosition = `center ${e.target.value}%`;
            }
        });

        window.removePreview = function() {
            fileInput.value = "";
            fileNameDisplay.innerText = "No file selected";
            previewImg.src = "";
            previewContainer.style.display = "none";
            window.writeSystemLog("Cleared temporary media upload asset cache data constraints.", "info");
        };

        // Read processing operations
        async function loadLiveMemories() {
            const timelineContainer = document.getElementById("dynamic-timeline");
            timelineContainer.innerHTML = "<p style='text-align: center; color: var(--dark-purple); font-weight:600;'>Reading our scrapbook from the clouds... ✨</p>";
            
            window.writeSystemLog("Executing query request sync stream target 'memories' collection...", "sys");
            window.updateDatabaseBadgeStatus("Syncing...", "badge-connecting");

            try {
                const q = query(collection(db, "memories"), orderBy("takenDate", "desc"));
                const querySnapshot = await getDocs(q);
                
                localMemoriesArray = [];
                querySnapshot.forEach((doc) => {
                    localMemoriesArray.push({ id: doc.id, ...doc.data() });
                });

                window.writeSystemLog(`Firestore collection fetch completed. Found [${localMemoriesArray.length}] indices documents.`, "success");
                window.updateDatabaseBadgeStatus("ONLINE", "badge-online");
                renderTimelineGrid();
            } catch (error) {
                console.error("Database read failure: ", error);
                window.writeSystemLog(`CRITICAL PIPELINE ERROR: ${error.message}`, "error");
                window.updateDatabaseBadgeStatus("ERROR", "badge-offline");
                timelineContainer.innerHTML = "<p style='color: red; text-align:center;'>Failed to load memories. Check Firebase permissions.</p>";
            }
        }

        function renderTimelineGrid() {
            const timelineContainer = document.getElementById("dynamic-timeline");
            timelineContainer.innerHTML = "";

            if (localMemoriesArray.length === 0) {
                timelineContainer.innerHTML = "<p style='color: #888; text-align:center;'>No photos in the database yet! Open the Control Panel to add one.</p>";
                document.getElementById("toggle-pics-btn").style.display = "none";
                return;
            }

            const groupedMap = {};
            localMemoriesArray.forEach((memory) => {
                const dateObj = new Date(memory.takenDate || memory.createdAt);
                const groupKey = dateObj.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
                
                if (!groupedMap[groupKey]) {
                    groupedMap[groupKey] = [];
                }
                groupedMap[groupKey].push(memory);
            });

            let globalPhotoCounter = 0;

            for (const [monthYearName, photosArray] of Object.entries(groupedMap)) {
                const section = document.createElement("section");
                section.className = "month-section reveal active";

                const headerDiv = document.createElement("div");
                headerDiv.className = "month-header";
                headerDiv.innerHTML = `<span class="dot"></span><h2>${monthYearName} 🌸</h2>`;
                section.appendChild(headerDiv);

                const gridDiv = document.createElement("div");
                gridDiv.className = "photo-grid";

                photosArray.forEach((memory) => {
                    const photoDiv = document.createElement("div");
                    photoDiv.className = "photo";

                    if (globalPhotoCounter >= 4 && !showAllPhotos) {
                        photoDiv.classList.add("hidden-pic");
                    } else if (globalPhotoCounter >= 4 && showAllPhotos) {
                        photoDiv.classList.add("show-anim");
                    }

                    const img = document.createElement("img");
                    img.src = memory.imageUrl;
                    img.alt = "Scrapbook Memory Card";
                    img.style.objectPosition = `center ${memory.focusY || '50%'}`;
                    
                    img.onclick = () => openPhotoDetails(memory.imageUrl, memory.takenDate || memory.createdAt, memory.focusY);
                    photoDiv.appendChild(img);

                    const actionsOverlay = document.createElement("div");
                    actionsOverlay.className = "photo-actions-overlay";

                    const downloadBtn = document.createElement("button");
                    downloadBtn.className = "action-icon-btn";
                    downloadBtn.innerHTML = "⬇️";
                    downloadBtn.title = "Download Photo";
                    downloadBtn.onclick = (e) => { 
                        e.stopPropagation(); 
                        downloadPhoto(memory.imageUrl, `memory-${monthYearName}.jpg`); 
                    };
                    actionsOverlay.appendChild(downloadBtn);

                    if (isAdmin) {
                        const editBtn = document.createElement("button");
                        editBtn.className = "action-icon-btn edit-style";
                        editBtn.innerHTML = "📐";
                        editBtn.title = "Adjust Focus Target";
                        editBtn.onclick = (e) => { 
                            e.stopPropagation(); 
                            editPhotoFocus(memory.id, memory.focusY); 
                        };
                        actionsOverlay.appendChild(editBtn);

                        const deleteBtn = document.createElement("button");
                        deleteBtn.className = "action-icon-btn delete-style";
                        deleteBtn.innerHTML = "🗑️";
                        deleteBtn.title = "Delete Memory permanently";
                        deleteBtn.onclick = (e) => { 
                            e.stopPropagation(); 
                            deletePhoto(memory.id); 
                        };
                        actionsOverlay.appendChild(deleteBtn);
                    }

                    photoDiv.appendChild(actionsOverlay);
                    gridDiv.appendChild(photoDiv);
                    globalPhotoCounter++;
                });

                section.appendChild(gridDiv);
                timelineContainer.appendChild(section);
            }

            const toggleBtn = document.getElementById("toggle-pics-btn");
            if (localMemoriesArray.length <= 4) {
                toggleBtn.style.display = "none";
            } else {
                toggleBtn.style.display = "inline-block";
                toggleBtn.innerText = showAllPhotos ? "Show Less Pics 💜" : "Show More Pics 🌸";
            }
        }

        window.downloadPhoto = function(base64Data, filename) {
            window.writeSystemLog(`Triggered photo local file stream extraction download workflow...`, "info");
            const link = document.createElement("a");
            link.href = base64Data;
            link.download = filename;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            window.writeSystemLog(`File stream array downloaded successfully. Key: "${filename}"`, "success");
        };

        window.deletePhoto = async function(docId) {
            if (confirm("Are you sure you want to delete this beautiful memory from the cloud? 🥺")) {
                window.writeSystemLog(`Sending transaction block delete signal target: Doc ID "${docId}"`, "sys");
                try {
                    await deleteDoc(doc(db, "memories", docId));
                    window.writeSystemLog(`Document reference block successfully removed from remote cloud instance index.`, "success");
                    loadLiveMemories();
                } catch (error) {
                    window.writeSystemLog(`DELETION FAIL MALFUNCTION: ${error.message}`, "error");
                    alert("Failed to delete memory module item.");
                }
            }
        };

        window.editPhotoFocus = async function(docId, currentFocusY) {
            const currentNumericValue = parseInt(currentFocusY) || 50;
            const targetPositionInput = prompt("Enter new alignment height ratio (0 = Top, 50 = Center, 100 = Bottom):", currentNumericValue);
            
            if (targetPositionInput !== null) {
                const parsedValue = parseInt(targetPositionInput);
                if (!isNaN(parsedValue) && parsedValue >= 0 && parsedValue <= 100) {
                    window.writeSystemLog(`Updating focus document tracking parameter matrix. ID: ${docId}, target focus height: ${parsedValue}%`, "sys");
                    try {
                        await updateDoc(doc(db, "memories", docId), {
                            focusY: `${parsedValue}%`
                        });
                        window.writeSystemLog(`Document layout configurations updated dynamically. Refreshing pipeline.`, "success");
                        loadLiveMemories();
                    } catch (error) {
                        window.writeSystemLog(`DOCUMENT RATIO TWEAK MALFUNCTION FAILURE: ${error.message}`, "error");
                        alert("Failed to save adjustments.");
                    }
                } else {
                    alert("Please insert a valid scale parameter constraint between 0 and 100.");
                }
            }
        };

        window.togglePics = function() {
            showAllPhotos = !showAllPhotos;
            renderTimelineGrid();
            document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
        };

        const passwordInput = document.getElementById("admin-password");
        const uploadZone = document.getElementById("admin-upload-zone");

        passwordInput.addEventListener("input", (e) => {
            if (e.target.value.toLowerCase() === "ilovehillary") {
                isAdmin = true;
                uploadZone.style.display = "block";
                document.getElementById("admin-auth-zone").style.display = "none";
                window.writeSystemLog("Admin identity certified. Elevating privilege state parameters to internal master role.", "success");
                renderTimelineGrid(); 
            }
        });

        // Data Compression & Post Transmit Actions
        document.getElementById("upload-submit-btn").addEventListener("click", async () => {
            const statusText = document.getElementById("upload-status");
            const file = fileInput.files[0];
            
            if (!file) {
                statusText.style.color = "red";
                statusText.innerText = "Please select a photo first! 🛑";
                window.writeSystemLog("Upload execution blocked: Local source file object reference is NULL.", "error");
                return;
            }

            const chosenDateStr = dateInput.value || new Date().toISOString().split('T')[0];
            window.writeSystemLog(`Beginning transmission pipeline protocol sequence for memory asset capture matching date: ${chosenDateStr}`, "sys");

            statusText.style.color = "var(--dark-purple)";
            statusText.innerText = "Processing and compressing image data... 🪄";

            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (event) => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = async () => {
                    const canvas = document.createElement("canvas");
                    let width = img.width;
                    let height = img.height;

                    const MAX_DIMENSION = 1200; 
                    if (width > height) {
                        if (width > MAX_DIMENSION) {
                            height *= MAX_DIMENSION / width;
                            width = MAX_DIMENSION;
                        }
                    } else {
                        if (height > MAX_DIMENSION) {
                            width *= MAX_DIMENSION / height;
                            height = MAX_DIMENSION;
                        }
                    }

                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext("2d");
                    ctx.drawImage(img, 0, 0, width, height);

                    const optimizedBase64String = canvas.toDataURL("image/jpeg", 0.75);
                    window.writeSystemLog(`Image compression operations complete. Result array base string dimension size constraints computed.`, "success");
                    
                    statusText.innerText = "Publishing directly to Firestore Database... 💾🚀";
                    window.writeSystemLog("Pushing compressed collection data packet array to Cloud Firestore instance...", "sys");

                    try {
                        await addDoc(collection(db, "memories"), {
                            imageUrl: optimizedBase64String,
                            focusY: `${focusInput.value}%`,
                            takenDate: chosenDateStr,
                            createdAt: new Date().toISOString()
                        });

                        window.writeSystemLog("Cloud Firestore transaction complete: Document successfully added to cloud database instance collection index.", "success");
                        statusText.style.color = "green";
                        statusText.innerText = "Published successfully! ✨🎉";
                        
                        removePreview();
                        dateInput.value = new Date().toISOString().split('T')[0];
                        
                        loadLiveMemories();
                        setTimeout(() => { toggleControlPanel(false); statusText.innerText = ""; }, 1500);
                    } catch (error) {
                        console.error("Firestore writing malfunction: ", error);
                        window.writeSystemLog(`FIRESTORE WRITE EXCEPTION ERROR: ${error.message}`, "error");
                        statusText.style.color = "red";
                        statusText.innerText = "Upload failed. Check firestore rules configuration.";
                    }
                };
            };
        });

        // Viewport intersection animations
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('active');
            });
        }, { threshold: 0.1 });

        function updateTimer() {
            const startDate = new Date("February 8, 2024 00:00:00").getTime();
            const now = new Date().getTime();
            const diff = now - startDate;

            document.getElementById("days").innerText = Math.floor(diff / (1000 * 60 * 60 * 24));
            document.getElementById("hours").innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            document.getElementById("minutes").innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            document.getElementById("seconds").innerText = Math.floor((diff % (1000 * 60)) / 1000);
        }

        // Live connection checking triggers
        window.addEventListener('online', () => {
            window.writeSystemLog("Network framework environment report: Browser is ONLINE.", "success");
            window.updateDatabaseBadgeStatus("ONLINE", "badge-online");
        });
        window.addEventListener('offline', () => {
            window.writeSystemLog("Network framework environment warning: Local browser hardware context dropped connection. System went OFFLINE.", "error");
            window.updateDatabaseBadgeStatus("OFFLINE", "badge-offline");
        });

        document.addEventListener("DOMContentLoaded", () => {
            dateInput.value = new Date().toISOString().split('T')[0];
            window.writeSystemLog("System Core Engine workspace boot cycle started. Connecting configuration properties to global web interface...", "sys");
            loadLiveMemories();
            document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
            setInterval(updateTimer, 1000);
            updateTimer();
        });
    </script>
</body>
</html>
