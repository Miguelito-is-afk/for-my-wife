<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Journey | Miguel & Hillary</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght=700&family=Poppins:wght=300;400;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="hearts-container">
        <div class="floating-heart" style="left:5%; animation-delay:0s">💜</div>
        <div class="floating-heart" style="left:15%; animation-delay:2s">🌸</div>
        <div class="floating-heart" style="left:25%; animation-delay:5s">✨</div>
        <div class="floating-heart" style="left:40%; animation-delay:1s">🌸</div>
        <div class="floating-heart" style="left:55%; animation-delay:3s">💜</div>
        <div class="floating-heart" style="left:70%; animation-delay:6s">✨</div>
        <div class="floating-heart" style="left:85%; animation-delay:2s">🌸</div>
        <div class="floating-heart" style="left:92%; animation-delay:4s">💜</div>
    </div>

    <button class="fab-admin-btn" id="open-control-panel-btn" onclick="toggleControlPanel(true)" title="Open Control Panel">🛠️</button>

    <div class="modal-overlay" id="control-panel-modal">
        <div class="control-panel-card">
            <button class="close-modal-btn" onclick="toggleControlPanel(false)">&times;</button>
            <h3>Control Panel</h3>
            
            <div id="admin-auth-zone">
                <input type="password" id="admin-password" placeholder="Enter Secret Code to Access...">
            </div>
            
            <div id="admin-upload-zone" style="display: none;">
                
                <div class="panel-tabs">
                    <button class="tab-btn active" id="tab-btn-upload" onclick="switchPanelTab('upload')">Upload Memory 📸</button>
                    <button class="tab-btn" id="tab-btn-logs" onclick="switchPanelTab('logs')">System Console 🖥️</button>
                </div>

                <div id="tab-content-upload">
                    <div class="upload-field">
                        <label for="photo-input" class="custom-file-upload">Choose Photos 📸</label>
                        <input type="file" id="photo-input" accept="image/*" multiple>
                        <span id="file-name-display">No file selected</span>
                    </div>

                    <div id="preview-container" style="display: none; position: relative;">
                        <div id="preview-images-grid"></div>
                        <button type="button" class="remove-preview-btn" onclick="removePreview()" title="Remove All Images">&times;</button>
                    </div>

                    <div class="date-field">
                        <label for="photo-date">When was this memory captured? 📅</label>
                        <input type="date" id="photo-date">
                    </div>
                    
                    <div class="slider-field">
                        <label>Adjust Focus Position (Up/Down):</label>
                        <input type="range" id="focus-y" min="0" max="100" value="50">
                    </div>
                    
                    <button class="action-btn" id="upload-submit-btn">Publish Memory Live ✨</button>
                    
                    <div id="upload-progress-container" style="display: none;">
                        <div id="upload-progress-bar"></div>
                    </div>
                    
                    <p id="upload-status"></p>
                </div>

                <div id="tab-content-logs" style="display: none;">
                    <div class="terminal-status-bar">
                        <span class="status-indicator-label">Database Network:</span>
                        <span id="db-status-badge" class="badge-connecting">CONNECTING...</span>
                    </div>
                    
                    <div class="terminal-console" id="terminal-console"></div>
                    
                    <button class="clear-logs-btn" onclick="clearConsoleLogs()">Clear Terminal Screen</button>
                </div>

            </div>
        </div>
    </div>

    <div class="modal-overlay" id="details-modal" onclick="toggleDetailsModal(false)">
        <div class="details-card" id="details-card-container" onclick="event.stopPropagation()">
            <button class="close-modal-btn" id="close-details-btn" onclick="toggleDetailsModal(false)">&times;</button>
            
            <button class="nav-btn prev-btn" id="modal-prev-btn">&#10094;</button>
            <button class="nav-btn next-btn" id="modal-next-btn">&#10095;</button>

            <div class="details-img-wrapper">
                <img id="details-img" src="" alt="Memory Preview Detailed View">
            </div>
            <p id="details-date-string"></p>
        </div>
    </div>

    <div class="modal-overlay" id="custom-dialog-modal" style="z-index: 300;">
        <div class="dialog-card" id="dialog-card">
            <div class="dialog-icon" id="dialog-icon">💜</div>
            <h3 id="dialog-title" style="font-family: 'Dancing Script', cursive; font-size: 2rem; color: var(--dark-purple); margin: 0;">Notice</h3>
            <p id="dialog-message" style="font-weight: 500; margin: 15px 0;"></p>
            <div id="dialog-input-container" style="display: none;">
                <input type="number" id="dialog-input" class="dialog-text-input" placeholder="Type here...">
            </div>
            <div class="dialog-buttons">
                <button class="dialog-btn cancel-btn" id="dialog-cancel-btn">Cancel</button>
                <button class="dialog-btn confirm-btn" id="dialog-confirm-btn">Okay ✨</button>
            </div>
        </div>
    </div>

    <header class="hero-header reveal">
        <div class="hero-glow glow-1"></div>
        <div class="hero-glow glow-2"></div>
        
        <div class="hero-content">
            <h1>Our Beautiful Journey</h1>
            <p class="hero-subtitle">Every moment, every memory, captured forever.</p>
            <div class="big-heart">💜</div>
        </div>
    </header>

    <main class="container">
        <section class="timer-card reveal">
            <h3 class="timer-title">How Long We've Loved</h3>
            <div id="timer">
                <div class="time-box">
                    <span id="days">0</span>
                    <p>Days</p>
                </div>
                <div class="time-box">
                    <span id="hours">0</span>
                    <p>Hours</p>
                </div>
                <div class="time-box">
                    <span id="minutes">0</span>
                    <p>Mins</p>
                </div>
                <div class="time-box">
                    <span id="seconds">0</span>
                    <p>Secs</p>
                </div>
            </div>
        </section>

        <div class="timeline" id="dynamic-timeline"></div>

        <div class="center-container reveal">
            <button class="toggle-btn" id="toggle-pics-btn">Show More Pics 🌸</button>
        </div>
    </main>

    <footer class="reveal">
        <div class="footer-content">
            <p class="footer-text">Created by MZBernados</p>
            <div class="footer-divider"></div>
            <p class="footer-dedication">Dedicated to</p>
            <p class="her-name">Hillary Angela L. Negapatan</p>
        </div>
        <div class="footer-glow"></div>
    </footer>

    <script>
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('active');
            });
        }, { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    </script>

    <script type="module" src="system.js"></script>
</body>
</html>
